[workspace]
name = "WHCA_UFFFS_Nowcast"
version = "1.0.0"
description = "WHCA UFFFS Workshop – Satellite Rainfall & Nowcasting"
channels = ["conda-forge"]
platforms = ["win-64"]

[dependencies]
python = "3.10.*"
numpy = "2.2.*"
xarray = "2025.6.*"
rasterio = "==1.4.3"
rioxarray = "==0.19.0"
pyproj = "==3.7.1"
matplotlib = "3.10.*"
matplotlib-base = "3.10.*"

shapely = "2.1.*"
cartopy = "0.25.*"
geopandas = "1.1.*"
pysteps = "1.18.*"
pillow = "11.*"
netcdf4 = "==1.7.2"
h5py = "3.14.*"
h5netcdf = "*"
dask = "2025.7.*"
dask-core = "2025.7.*"
pandas = "2.3.*"
jupyterlab = "4.4.*"
ipykernel = "6.30.*"

[environments]
default = { solve-group = "default" }

[tasks]
setup-kernel = "python -m ipykernel install --user --name whca_ufffs_nowcast --display-name 'W@HCA UFFFS Nowcast (pixi)'"
notebook = { cmd = "jupyter lab", depends-on = ["setup-kernel"] }
list-kernels = "jupyter kernelspec list"
clean-kernel = "jupyter kernelspec remove -f whca_ufffs_nowcast || echo 'Kernel not found'"